<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Pie Chart</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:60px 10%;
}

.skills-section h2{
    font-size:38px;
    margin-bottom:15px;
}

.skills-section span{
    color:#38bdf8;
}

.skills-subtitle{
    color:#94a3b8;
    margin-bottom:50px;
    max-width:700px;
}

/* Grid Layout */
.skills-container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
    gap:40px;
}

/* Circular Progress */
.circle{
    width:160px;
    height:160px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    margin:auto;
}

.circle::before{
    content:"";
    position:absolute;
    width:120px;
    height:120px;
    background:#0f172a;
    border-radius:50%;
}

.circle span{
    position:relative;
    font-weight:bold;
    font-size:20px;
}

/* Individual Pie Charts */
.c{
    background:conic-gradient(#38bdf8 0% 90%, #1e293b 90% 100%);
}

.java{
    background:conic-gradient(#38bdf8 0% 85%, #1e293b 85% 100%);
}

.python{
    background:conic-gradient(#38bdf8 0% 88%, #1e293b 88% 100%);
}

.dsa{
    background:conic-gradient(#38bdf8 0% 80%, #1e293b 80% 100%);
}

.frontend{
    background:conic-gradient(#38bdf8 0% 92%, #1e293b 92% 100%);
}

.skill-name{
    text-align:center;
    margin-top:15px;
    font-weight:500;
}

</style>
</head>
<body>

<div class="skills-section">

    <h2>My <span>Technical Skills</span></h2>
    <p class="skills-subtitle">
        As a Technical Educator, I focus on building strong programming fundamentals 
        and practical development skills that help students create real-world applications.
    </p>

    <div class="skills-container">

        <div>
            <div class="circle c"><span>95%</span></div>
            <div class="skill-name">C Programming</div>
        </div>

        <div>
            <div class="circle java"><span>90%</span></div>
            <div class="skill-name">Java</div>
        </div>

        <div>
            <div class="circle python"><span>90%</span></div>
            <div class="skill-name">Python</div>
        </div>

        <div>
            <div class="circle dsa"><span>95%</span></div>
            <div class="skill-name">DSA</div>
        </div>

        <div>
            <div class="circle frontend"><span>92%</span></div>
            <div class="skill-name">Frontend</div>
        </div>

    </div>

</div>

</body>
</html>
